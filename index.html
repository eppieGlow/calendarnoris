<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendrier Norris — Univers Chuck</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root{
  --bg:#f5f5f7;
  --card:#ffffff;
  --text:#1d1d1f;
  --accent:#0071e3;
  --chuck:#ff3b30;
}

body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background:var(--bg);
  color:var(--text);
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:white;
  box-shadow:0 1px 10px rgba(0,0,0,0.05);
}

.nav button{
  background:var(--accent);
  border:none;
  color:white;
  padding:8px 10px;
  border-radius:10px;
  cursor:pointer;
}

.container{
  display:flex;
  flex-wrap:wrap;
}

.sidebar{
  width:260px;
  background:white;
  padding:15px;
  border-right:1px solid #eee;
}

.calendar{
  flex:1;
  padding:10px;
}

.weekdays, .days{
  display:grid;
  grid-template-columns:repeat(7,1fr);
}

.weekdays{
  text-align:center;
  font-size:0.7rem;
  color:#888;
}

.day{
  background:var(--card);
  border-radius:10px;
  padding:6px;
  min-height:90px;
  cursor:pointer;
  transition:0.2s;
}

.day:hover{
  transform:scale(1.05);
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.day-number{
  font-size:0.75rem;
  font-weight:600;
}

.meta{
  font-size:0.6rem;
  color:var(--chuck);
}

.phrase{
  font-size:0.6rem;
  margin-top:4px;
  font-style:italic;
}

</style>
</head>
<body>

<div class="header">
  <div>📅 Calendrier Norris <strong>🔥 Chuck Edition</strong></div>
  <div class="nav">
    <button onclick="prevMonth()"><i class="fas fa-chevron-left"></i></button>
    <span id="monthLabel"></span>
    <button onclick="nextMonth()"><i class="fas fa-chevron-right"></i></button>
  </div>
</div>

<div class="container">

  <div class="sidebar">
    <h3>💀 Univers Chuck</h3>
    <p id="globalTime"></p>
    <hr>
    <p>🥋 Chuck Norris ne vit pas dans le temps, c’est le temps qui vit autour de lui.</p>
  </div>

  <div class="calendar">
    <div class="weekdays">
      <div>Dim</div><div>Lun</div><div>Mar</div><div>Mer</div><div>Jeu</div><div>Ven</div><div>Sam</div>
    </div>
    <div class="days" id="days"></div>
  </div>

</div>

"Chuck Norris peut te faire perdre sans jouer",
"Chuck Norris peut diviser l’impossible",
"Chuck Norris peut accélérer le temps",
"Chuck Norris peut arrêter les pensées",
"Chuck Norris peut créer des paradoxes",

"Chuck Norris peut changer le passé",
"Chuck Norris peut changer le futur",
"Chuck Norris peut changer le présent",
"Chuck Norris est la réponse"

const daysContainer = document.getElementById("days");

function getChuckData(date){
  let diffDays = Math.floor((date - chuckZero)/(1000*60*60*24));

  let years = Math.floor(diffDays / 365);
  let months = Math.floor((diffDays % 365) / 30);
  let days = diffDays % 30;

  return {years, months, days, diffDays};
}

function randomPhrase(){
  return phrases[Math.floor(Math.random()*phrases.length)];
}

function render(){
  daysContainer.innerHTML = "";

  let year = current.getFullYear();
  let month = current.getMonth();

  document.getElementById("monthLabel").innerText = current.toLocaleDateString('fr-FR',{month:'long', year:'numeric'});

  let firstDay = new Date(year, month, 1).getDay();
  let daysInMonth = new Date(year, month+1,0).getDate();

  for(let i=0;i<firstDay;i++) daysContainer.appendChild(document.createElement("div"));

  for(let d=1; d<=daysInMonth; d++){
    let date = new Date(year, month, d);
    let data = getChuckData(date);

    let div = document.createElement("div");
    div.className="day";

    div.innerHTML = `
      <div class="day-number">${d} 🥋</div>
      <div class="meta">AN ${data.years}</div>
      <div class="meta">M ${data.months}</div>
      <div class="meta">J ${data.days}</div>
      <div class="phrase">${randomPhrase()}</div>
    `;

    daysContainer.appendChild(div);
  }
}

function nextMonth(){ current.setMonth(current.getMonth()+1); render(); }
function prevMonth(){ current.setMonth(current.getMonth()-1); render(); }

render();
</script>

</body>
</html>
